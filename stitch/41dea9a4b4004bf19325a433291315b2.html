<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Record Editor - Pulse Note</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#0f766e",
                        "secondary-fixed-dim": "#b7c8e1",
                        "secondary": "#505f76",
                        "on-secondary-fixed": "#0b1c30",
                        "tertiary-container": "#9c573a",
                        "tertiary-fixed": "#ffdbce",
                        "on-tertiary-container": "#ffe5db",
                        "surface-bright": "#f7f9fb",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#72361b",
                        "surface-variant": "#e0e3e5",
                        "surface-container": "#eceef0",
                        "on-secondary-fixed-variant": "#38485d",
                        "secondary-container": "#d0e1fb",
                        "on-error": "#ffffff",
                        "tertiary": "#7f4025",
                        "inverse-primary": "#80d5cb",
                        "on-tertiary-fixed": "#370e00",
                        "outline": "#6e7977",
                        "on-primary-fixed-variant": "#00504a",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#00201d",
                        "surface-tint": "#006a63",
                        "error": "#ba1a1a",
                        "primary-fixed": "#9cf2e8",
                        "background": "#f7f9fb",
                        "inverse-surface": "#2d3133",
                        "surface-container-highest": "#e0e3e5",
                        "on-primary": "#ffffff",
                        "surface": "#f7f9fb",
                        "inverse-on-surface": "#eff1f3",
                        "on-surface": "#191c1e",
                        "surface-container-low": "#f2f4f6",
                        "on-secondary-container": "#54647a",
                        "surface-dim": "#d8dadc",
                        "tertiary-fixed-dim": "#ffb598",
                        "on-primary-container": "#a3faef",
                        "primary": "#005c55",
                        "secondary-fixed": "#d3e4fe",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#e6e8ea",
                        "on-error-container": "#93000a",
                        "on-background": "#191c1e",
                        "on-tertiary": "#ffffff",
                        "primary-fixed-dim": "#80d5cb",
                        "on-surface-variant": "#3e4947",
                        "outline-variant": "#bdc9c6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xs": "4px",
                        "xl": "32px",
                        "lg": "24px",
                        "sm": "8px",
                        "margin-desktop": "32px",
                        "margin-mobile": "16px",
                        "md": "16px",
                        "gutter": "16px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-sm": ["11px", { "lineHeight": "14px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-sm": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-sm": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface flex flex-col min-h-screen">
    {{DATA:COMPONENTS:COMPONENTS_2}}
    <main class="flex-grow flex items-center justify-center p-md lg:p-xl">
<div class="w-full max-w-2xl bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm p-lg">
<header class="flex justify-between items-center border-b border-outline-variant pb-md mb-lg">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Record Editor</h1>
<div class="flex items-center text-secondary">
<span class="material-symbols-outlined mr-xs text-sm">error</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Unsaved Changes</span>
</div>
</header>
<form class="space-y-lg">
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface" for="note-title">
                        Note Title <span class="text-error">*</span>
</label>
<input class="w-full bg-surface-bright border border-error rounded-DEFAULT px-md py-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-body-md text-body-md text-on-surface placeholder-on-surface-variant transition-all duration-200" id="note-title" name="note-title" placeholder="Enter title..." type="text"/>
<p class="font-body-sm text-body-sm text-error mt-xs flex items-center">
<span class="material-symbols-outlined mr-xs text-[16px]">info</span>
                        Title is required.
                    </p>
</div>
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface" for="note-content">
                        Note Content
                    </label>
<textarea class="w-full bg-surface-bright border border-outline-variant rounded-DEFAULT px-md py-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-body-md text-body-md text-on-surface placeholder-on-surface-variant transition-all duration-200 resize-y" id="note-content" name="note-content" placeholder="Start typing your note here..." rows="8"></textarea>
</div>
<div class="pt-lg flex justify-end items-center gap-md border-t border-outline-variant">
<button class="font-label-md text-label-md px-md py-sm border border-outline-variant rounded-DEFAULT text-secondary hover:bg-surface-container-low transition-colors" data-action="ACT_CANCEL_EDIT" type="button">
                        Cancel
                    </button>
<button class="font-label-md text-label-md px-md py-sm bg-primary text-on-primary rounded-DEFAULT hover:bg-surface-tint transition-colors shadow-sm" data-action="ACT_SAVE_RECORD" type="submit">
                        Save Record
                    </button>
</div>
</form>
</div>
</main>
</body></html>
